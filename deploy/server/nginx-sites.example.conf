# Replace domains/cert paths as needed.
# If your frontend uses `baseURL = '/api'`, each frontend host must proxy `/api`.

server {
    listen 80;
    server_name licheng.website www.licheng.website;
    root /var/www/licheng.website;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:5922/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

